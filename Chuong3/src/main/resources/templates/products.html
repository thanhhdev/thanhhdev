<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách sản phẩm</title>
</head>
<body>
<h1>Danh sách sản phẩm</h1>

<a href="/products/add">Thêm sản phẩm</a>

<form method="get" action="/products">
    <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm theo tên">
    <button type="submit">Tìm</button>
</form>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Tên</th>
        <th>Giá</th>
        <th>Chi tiết</th>
        <th>Xóa</th>
    </tr>
    <tr th:each="product : ${products}">
        <td th:text="${product.id}"></td>
        <td th:text="${product.name}"></td>
        <td th:text="${#numbers.formatDecimal(product.price, 0, 'POINT', 0, 'NONE')} + ' ₫'"></td>
        <td>
            <a th:href="@{/products/{id}(id=${product.id})}">Xem</a>
        </td>
        <td>
            <a th:href="@{/products/delete/{id}(id=${product.id})}">Xóa</a>
        </td>
    </tr>
</table>
</body>
</html>
